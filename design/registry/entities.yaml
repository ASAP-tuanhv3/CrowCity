# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.
# Register a formula when its output feeds into another system's input,
# or when another GDD references it by name.
#
# Required fields: name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# Optional: expression (the actual formula), notes

formulas:
  - name: population_at_rest
    status: active
    source: design/gdd/npc-spawner.md
    referenced_by:
      - design/gdd/npc-spawner.md
      - design/gdd/absorb-system.md
    variables:
      - NPC_POOL_SIZE
      - NPC_RESPAWN_DELAY_MIN
      - NPC_RESPAWN_DELAY_MAX
      - R_absorb_total
    output_range: [0, 300]
    expression: "NPC_POOL_SIZE * T_active_avg / (T_active_avg + T_respawn_avg)"
    notes: "Steady-state active NPC count. T_respawn_avg = (MIN+MAX)/2 = 7.5s at defaults. At 8-player count=50: ~74 active; at 12-player count=100: ~44 (peak combat). Range [0, NPC_POOL_SIZE=300]. Feeds ρ_design check (F1 in npc-spawner.md) which validates Absorb F4 Pillar 5 calibration. AMENDED 2026-04-23: expression numerator corrected to T_active per npc-spawner.md L166 fix; NPC_POOL_SIZE updated 200→300; output_range widened accordingly."
    added: 2026-04-22
    revised: 2026-04-23

  - name: radius_from_count
    status: active
    source: docs/architecture/adr-0001-crowd-replication-strategy.md
    referenced_by:
      - docs/architecture/adr-0001-crowd-replication-strategy.md
      - design/gdd/crowd-state-manager.md
      - design/gdd/absorb-system.md
      - design/gdd/crowd-collision-resolution.md
      - design/gdd/relic-system.md
      - design/gdd/chest-system.md
      - design/gdd/vfx-manager.md
      - design/gdd/crowd-replication-strategy.md
    variables:
      - count
    output_range: [1.53, 18.04]
    expression: "2.5 + sqrt(count) * 0.55 [* crowd.radiusMultiplier if set]"
    notes: "Hitbox radius for crowd-vs-crowd + crowd-vs-neutral overlap. count ∈ [1, 300]. sqrt compresses growth intentionally. AMENDED 2026-04-23: Relic System composes via crowd.radiusMultiplier ∈ [0.5, 1.5]; CSM stores post-multiplied value. Base output unchanged [3.05, 12.03]; composed output [1.53, 18.04]. AMENDED 2026-04-24 (CSM Batch 1 complete): CSM GDD added radiusMultiplier field + F1 composition + recomputeRadius API per this registry spec. Chest §G uses max composed output (16.24 at Wingspan 1.35) to derive CHEST_PROMPT_DISTANCE=20."
    added: 2026-04-21
    revised: 2026-04-24

  - name: collision_transfer_per_tick
    status: active
    source: design/gdd/crowd-state-manager.md
    referenced_by:
      - design/gdd/crowd-state-manager.md
      - design/gdd/follower-entity.md
      - design/gdd/crowd-collision-resolution.md
    variables:
      - TRANSFER_RATE_BASE
      - TRANSFER_RATE_SCALE
      - TRANSFER_RATE_MAX
      - SERVER_TICK_HZ
      - count_delta
    output_range: [1, 4]
    expression: "ceil(clamp(TRANSFER_RATE_BASE + TRANSFER_RATE_SCALE * max(0, count_delta), TRANSFER_RATE_BASE, TRANSFER_RATE_MAX) / SERVER_TICK_HZ)"
    notes: "Followers converted per 15 Hz tick per overlapping rival pair. Now DYNAMIC per-pair based on count_delta = attacker.count - victim.count. At defaults: equal counts → ceil(15/15)=1; 100-count advantage → ceil(30/15)=2; max advantage → ceil(60/15)=4. Follower Entity F6 observes actual count delta from broadcast, not static formula."
    added: 2026-04-21
    revised: 2026-04-22

  - name: triple_overlap_drain
    status: active
    source: design/gdd/crowd-state-manager.md
    referenced_by:
      - design/gdd/crowd-state-manager.md
      - design/gdd/crowd-collision-resolution.md
    variables:
      - collision_transfer_per_tick
      - overlapping_rival_count
    output_range: [0, -44]
    expression: "-collision_transfer_per_tick * overlapping_rival_count"
    notes: "Additive stacking. Max 11 simultaneous rivals (hard cap at 12 players - self). No drain cap; GraceWindow is the safety valve."
    added: 2026-04-21
    revised: ""

  - name: hue_index_assignment
    status: active
    source: design/gdd/crowd-state-manager.md
    referenced_by:
      - design/gdd/crowd-state-manager.md
      - design/art/art-bible.md
      - design/gdd/hud.md
      - design/gdd/player-nameplate.md
    variables:
      - join_order
    output_range: [1, 12]
    expression: "((join_order - 1) mod 12) + 1"
    notes: "Maps 1-indexed player join order to safe palette index. Luau mod requires join_order >= 1 assertion. HUD mini-leaderboard rows + Player Nameplate text tinted by this hue."
    added: 2026-04-21
    revised: 2026-04-23

  - name: effective_toll_chain
    status: active
    source: design/gdd/relic-system.md
    referenced_by:
      - design/gdd/relic-system.md
      - design/gdd/chest-system.md
      - design/gdd/vfx-manager.md
    variables:
      - baseToll
      - relic_onChestOpen_returns
      - TOLL_FLOOR
    output_range: [1, 120]
    expression: "floor(baseToll * product(M_s for s in active_slots_with_onChestOpen)) clamped to [TOLL_FLOOR, baseToll]"
    notes: "Toll discount chain — multiplicative, slot-index order. At MVP scale (non-stackable, 1 toll relic max), chain simplifies to single multiplier. Floor clamp at 1 prevents zero-toll exploits at future stacking. Chest System calls RelicEffectHandler.queryChestToll before deduction; Chest §F1 consumes formula."
    added: 2026-04-23
    revised: 2026-04-23

