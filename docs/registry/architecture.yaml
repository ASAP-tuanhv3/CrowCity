# Architecture Decision Registry
#
# PURPOSE: Single source of truth for key architectural stances that all ADRs
# must agree on. Skills check this before writing new ADRs to detect conflicts
# at authoring time — before stories are created against contradictory decisions.
#
# RULES:
#   - Register a stance when it constrains how OTHER systems must be built.
#     An internal implementation detail that affects only one ADR does not need
#     to be registered.
#   - Never delete entries — set status: superseded_by: ADR-NNNN instead.
#   - When a stance changes: update the entry, set revised: to today's date,
#     add a comment with the old value, and run /architecture-review to check
#     what ADRs are now invalidated.
#   - adr: is the authoritative source. All other ADRs that depend on this
#     stance list themselves in referenced_by.
#
# WRITTEN BY: /architecture-decision (Phase 5 — after ADR is approved)
# READ BY:    /architecture-decision (Step 2 — before authoring begins)
#             /architecture-review (Phase 4 — cross-ADR conflict baseline)
#             /create-stories (to embed architectural constraints in stories)
#             /dev-story (to check implementation against accepted stances)
#
# SEARCH PATTERNS (for skills using Grep):
#   All state owners:       Grep pattern="^  - state:" path="docs/registry/architecture.yaml"
#   Who owns player_health: Grep pattern="state: player_health"
#   All signal contracts:   Grep pattern="pattern: signal"
#   Budget for combat:      Grep pattern="system: combat"
#   All forbidden patterns: Grep pattern="^  - pattern:" (forbidden_patterns section)
#   Superseded entries:     Grep pattern="status: superseded"

version: 1
last_updated: "2026-04-20"

# ─── STATE OWNERSHIP ─────────────────────────────────────────────────────────
# Who is the authoritative owner of each piece of shared game state.
# Conflicts: two ADRs claiming to own the same state = data race / authority bug.
#
# Register state when it is READ or WRITTEN by more than one system.
# Internal-only state (never accessed by another system) does not need to be registered.
#
# Required fields: state, owner_system, adr, interface, referenced_by[], added
# interface: how other systems access this state (read-only property, method call,
#   signal, shared resource, etc.) — this is the contract other ADRs depend on.

state_ownership:
  - state: crowd_state
    status: active
    owner_system: crowd-state-server
    adr: docs/architecture/adr-0001-crowd-replication-strategy.md
    interface: "CrowdStateServer.get(crowdId) -> CrowdState?, .updateCount(crowdId, delta), .updatePosition(crowdId, newPos). CrowdState = { id, position, radius, count, hue, activeRelics }"
    write_access: crowd-state-server-only
    referenced_by:
      - docs/architecture/adr-0001-crowd-replication-strategy.md
      - docs/architecture/adr-0002-tick-orchestrator.md  # Phase 5 stateEvaluate + Phase 8 broadcastAll
      - docs/architecture/adr-0004-csm-authority.md       # per-API caller matrix + Pillar 4 anti-P2W invariant
      - docs/architecture/adr-0006-module-placement-rules.md  # ServerStorage placement firewall codification
    added: 2026-04-20
    revised: 2026-04-26

# Example:
#
# state_ownership:
#   - state: player_health
#     status: active           # active | superseded_by: ADR-NNNN
#     owner_system: health-system
#     adr: docs/architecture/adr-0001-health-system.md
#     interface: "HealthComponent.current_health (read-only float, range 0–max_health)"
#     write_access: health-system-only   # only owner can write; others read
#     referenced_by:
#       - docs/architecture/adr-0001-health-system.md
#       - docs/architecture/adr-0003-combat-system.md   # reads to apply damage
#       - docs/architecture/adr-0007-ui-system.md       # reads to display HUD
#     added: 2026-03-26
#     revised: ""


# ─── INTERFACE CONTRACTS ──────────────────────────────────────────────────────
# How systems are required to communicate with each other.
# Conflicts: one ADR expects signal, another expects direct call = integration bug.
#
# Register a contract when the communication pattern between two systems is
# explicitly decided in an ADR and other systems must follow the same pattern.
#
# pattern options: signal | direct_call | event_bus | shared_resource | rpc | none

interfaces:
  - contract: crowd_state_broadcast
    status: active
    pattern: rpc
    producer: crowd-state-server
    consumers:
      - crowd-render-client (consumes per-crowd state to drive local rendering)
    adr: docs/architecture/adr-0001-crowd-replication-strategy.md
    signal_signature: "UnreliableRemoteEvent 'CrowdStateBroadcast' fires at 15 Hz. Payload: buffer-encoded (30 B/crowd) — crowdId u64 | tick u16 | pos Vec3 f32[3] | radius f32 | count u16 | hue u8 | state u8"
    referenced_by:
      - docs/architecture/adr-0001-crowd-replication-strategy.md
      - docs/architecture/adr-0002-tick-orchestrator.md  # Phase 8 dispatcher
      - docs/architecture/adr-0003-performance-budget.md  # 5.4 KB/s bandwidth allocation
    added: 2026-04-20
    revised: 2026-04-25

  - contract: tick_orchestration
    status: active
    pattern: direct_call
    producer: tick-orchestrator
    consumers:
      - collision-resolver   # Phase 1
      - relic-system         # Phase 2
      - absorb-system        # Phase 3
      - chest-system         # Phase 4
      - crowd-state-server   # Phase 5 stateEvaluate + Phase 8 broadcastAll
      - match-state-server   # Phase 6 timerCheck + Phase 7 eliminationConsumer
      - peel-dispatcher      # Phase 9 flush
    adr: docs/architecture/adr-0002-tick-orchestrator.md
    signal_signature: "callback(tickCount: number, ctx: TickContext) -> (). Static 9-phase table registered once at boot via TickOrchestrator._registerPhases; synchronous dispatch per 15 Hz tick."
    referenced_by:
      - docs/architecture/adr-0002-tick-orchestrator.md
      - docs/architecture/adr-0003-performance-budget.md  # per-phase CPU allocation owner
      - docs/architecture/adr-0004-csm-authority.md       # TickOrchestrator sole caller of stateEvaluate/broadcastAll
    added: 2026-04-24
    revised: 2026-04-25

  - contract: csm_write_api
    status: active
    pattern: direct_call
    producer: crowd-state-server
    authorised_callers_per_method:
      create: [round-lifecycle]
      destroy: [round-lifecycle]
      updateCount: [absorb-system, collision-resolver, chest-system, relic-effect-handler]
      recomputeRadius: [relic-effect-handler]
      setStillOverlapping: [collision-resolver]
      stateEvaluate: [tick-orchestrator]   # Phase 5
      broadcastAll: [tick-orchestrator]    # Phase 8
    adr: docs/architecture/adr-0004-csm-authority.md
    signal_signature: "Per-API caller restrictions per ADR-0004 §Write-Access Matrix. updateCount(crowdId: string, delta: number, source: DeltaSource) where DeltaSource ∈ {Absorb, Collision, Chest, Relic}. Read APIs (get, getAllActive, getAllCrowdPositions) unrestricted server-side; callers MUST NOT mutate returned references."
    enforcement: "L1 module placement (ServerStorage) + L2 code review + L3 control manifest + L4 architecture review + L5 story readiness — defense-in-depth, no runtime guard."
    referenced_by:
      - docs/architecture/adr-0004-csm-authority.md
      - docs/architecture/adr-0008-npc-spawner-authority.md  # NPCSpawner is read-only consumer of getAllCrowdPositions; FORBIDDEN from all CSM mutators per Pillar 4
    added: 2026-04-25
    revised: 2026-04-26

  - contract: npc_state_broadcast
    status: active
    pattern: rpc
    producer: npc-spawner
    consumers:
      - npc-spawner-client (mirror pool 300 Parts; receives delta + bootstrap to drive local rendering)
    adr: docs/architecture/adr-0008-npc-spawner-authority.md
    signal_signature: "UnreliableRemoteEvent 'NpcStateBroadcast' fires at 15 Hz with per-client relevance filter (crowd.radius + 25 studs). Payload: buffer-encoded (8 B/changed-NPC) — npcId u8 | posX i16 | posZ i16 | flags u8 (active + tx-changing) | transparency u8 | reserved u8. Plus reliable RemoteEvent 'NpcPoolBootstrap' fires once per client on PlayerAdded with full 300-NPC initial state (~2.4 KB single-shot)."
    enforcement: "NPCSpawner sole producer; NpcSpawnerClient sole consumer. Native Roblox Part replication FORBIDDEN per forbidden_pattern: native_part_replication_for_npcs. Workspace.StreamingEnabled = false on arena map (per NPC Spawner GDD §Edge Cases R226)."
    referenced_by:
      - docs/architecture/adr-0008-npc-spawner-authority.md
      - docs/architecture/adr-0003-performance-budget.md  # 3.0 KB/s bandwidth allocation
    added: 2026-04-26
    revised: ""

  - contract: npc_pool_authority
    status: active
    pattern: direct_call
    producer: npc-spawner
    authorised_callers_per_method:
      createAll: [round-lifecycle]
      destroyAll: [round-lifecycle, players-player-removing]
      getAllActiveNPCs: [absorb-system]                # Phase 3 only; read-only frozen snapshot
      reclaim: [absorb-system]                          # Phase 3 only; SYNCHRONOUS; double-reclaim asserts
    adr: docs/architecture/adr-0008-npc-spawner-authority.md
    signal_signature: "createAll(participants: { Player }): () | destroyAll(): () | getAllActiveNPCs(): { NpcRecord } | reclaim(npcId: number): ()"
    enforcement: "L1 module placement (ServerStorage/Source/NPCSpawner) + L2 code review + L3 control manifest + L4 architecture review + L5 story readiness."
    referenced_by:
      - docs/architecture/adr-0008-npc-spawner-authority.md
    added: 2026-04-26
    revised: ""

  - contract: round_lifecycle_authority
    status: active
    pattern: direct_call
    producer: round-lifecycle
    authorised_callers_per_method:
      createAll: [match-state-server]            # T4 transition only
      setWinner: [match-state-server]            # Active exit only
      getPlacements: [match-state-server]        # Result entry only — must follow setWinner
      getPeakTimestamp: [match-state-server]     # F4 tiebreak during Active only
      destroyAll: [match-state-server]           # T9 transition only
    adr: docs/architecture/adr-0005-msm-roundlifecycle-split.md
    signal_signature: "createAll(participants: { Player }): () | setWinner(crowdId: string?): () | getPlacements(): { Placement } | getPeakTimestamp(crowdId: string): number? | destroyAll(): ()"
    enforcement: "L1 module placement (ServerStorage/Source/RoundLifecycle) + L2 code review + L3 control manifest + L4 architecture review + L5 story readiness — MSM is sole caller of all 5 RL methods. T9 ordering invariant (destroyAll → clearAll → broadcast) + Result-entry ordering (grant → broadcast) locked at architectural level."
    referenced_by:
      - docs/architecture/adr-0005-msm-roundlifecycle-split.md
      - docs/architecture/adr-0001-crowd-replication-strategy.md  # CrowdEliminated reliable + CountChanged BindableEvent subscribed by RL
      - docs/architecture/adr-0004-csm-authority.md  # CountChanged subscriber matrix
    added: 2026-04-26
    revised: ""

  - contract: match_state_authority
    status: active
    pattern: direct_call
    producer: match-state-server
    authorised_callers_per_method:
      get: [any-server-system, client-via-RemoteFunction]      # read-only
      getParticipation: [any-server-system, client-via-RemoteFunction]
      getStateEndsAt: [any-server-system]
      timerCheck: [tick-orchestrator]                           # Phase 6 only
      eliminationConsumer: [tick-orchestrator]                  # Phase 7 only
      _transitionTo: [match-state-server-internal]              # MSM-private; never external
    adr: docs/architecture/adr-0005-msm-roundlifecycle-split.md
    signal_signature: "get(): MatchState | getParticipation(player: Player): boolean | getStateEndsAt(): number? | timerCheck(): () [Phase 6] | eliminationConsumer(): () [Phase 7] | MatchStateChanged reliable RemoteEvent fires on every transition with {state, serverTimestamp, stateEndsAt, meta}"
    enforcement: "L1 module placement (ServerStorage/Source/MatchStateServer) + L2 code review + L3 control manifest. _transitionTo is MSM-internal; no external caller. Phase 6/7 dispatched only by TickOrchestrator per ADR-0002."
    referenced_by:
      - docs/architecture/adr-0005-msm-roundlifecycle-split.md
      - docs/architecture/adr-0002-tick-orchestrator.md  # Phase 6/7 dispatcher
    added: 2026-04-26
    revised: ""

  - contract: remote_validator
    status: active
    pattern: direct_call
    producer: remote-validator
    authorised_callers_per_method:
      checkPlayerActive: [any-server-handler]
      checkMatchActive: [any-server-handler]
      checkParticipating: [any-server-handler]
      checkType: [any-server-handler]
      checkStringLength: [any-server-handler]
      checkPayloadSize: [any-server-handler]
      checkRate: [any-server-handler]
      resetForRound: [round-lifecycle]                         # T9 destroyAll chain
    adr: docs/architecture/adr-0010-server-authoritative-validation-policy.md
    signal_signature: "All checks return ValidationResult (boolean). Mandatory 4-check guard pattern (identity / state / parameters / rate) on every client→server handler. Silent rejection on failure (no client-visible error)."
    enforcement: "L1 Roblox engine sets player argument trustworthily; L2 code review verifies all 4 categories called per handler; L3 Selene rule (planned, Production); L4 control manifest extraction; L5 architecture review; L6 story readiness; L7 PenTest at MVP-Integration-3. Per-player rate-limit state cleared at RoundLifecycle T9 (ADR-0005 ordering invariant)."
    referenced_by:
      - docs/architecture/adr-0010-server-authoritative-validation-policy.md
      - docs/architecture/adr-0005-msm-roundlifecycle-split.md  # T9 ordering chain includes resetForRound
    added: 2026-04-26
    revised: ""

  - contract: persistence_schema
    status: active
    pattern: direct_call
    producer: player-data-server
    authorised_callers_per_method:
      updateValue: [any-server-system, currency-system, market, receipt-processor, ftue-manager-server]
      getValue: [any-server-system, player-data-client-via-PlayerDataUpdated]
      loadProfileAsync: [server-bootstrap, players-player-added]
      onPlayerRemovingAsync: [players-player-removing]
    adr: docs/architecture/adr-0011-persistence-schema.md
    signal_signature: "PlayerDataServer.updateValue(player, PlayerDataKey, mutator: (current) -> new) | PlayerDataServer.getValue(player, PlayerDataKey) | PlayerDataUpdated reliable RemoteEvent fires on server mutation with delta payload."
    enforcement: "L1 module placement (ServerStorage/Source/PlayerDataServer + ReplicatedStorage/Dependencies/ProfileStore); L2 code review against §MVP Schema + §Pillar 3 Forbidden Keys + §Pillar 4 Boundary; L3 control manifest extraction; L4 architecture review; L5 story readiness; L6 pre-production gate-check. Direct DataStoreService calls forbidden (ADR-0006 + ADR-0011); ProfileStore is sole wrapper. _schemaVersion drives migration via OnProfileVersionUpgrade callbacks under PlayerDataServer/migrations/."
    schema_v1_keys:
      - _schemaVersion          # number = 1; migration meta
      - Coins                   # number = 0; soft currency (Pillar 4 cosmetic-economy)
      - OwnedSkins              # { [skinId]: true } = {}; cosmetic
      - SelectedSkin            # string? = "Default"; cosmetic
      - LifetimeAbsorbs         # number = 0; analytics lifetime stat
      - LifetimeWins            # number = 0; analytics lifetime stat
      - FtueStage               # string = "Stage1"; onboarding (template)
    pillar_3_forbidden_classes:
      - per-round-crowd-state          # CurrentCount, CurrentRadius, CurrentHue, etc.
      - per-round-relic-inventory      # OwnedRelics, ActiveRelics, RelicHistory
      - per-round-chest-state          # OpenedChestIds, ChestCooldowns, LastChestOpenTime
      - per-round-elimination-state    # EliminationCount, IsEliminated
      - per-round-peak-placement       # PeakCount, BestPlacement (use LifetimeAbsorbs/Wins instead)
      - in-flight-vfx-state            # LastVfxId, ActiveParticleCount
      - npc-pool-state                 # OwnedNpcs, NpcKills
      - msm-state-mirror               # LastMatchState, ParticipationFlag
      - pillar-4-violating-modifiers   # OwnedAbsorbBonusMultiplier, BoughtRadiusBoost
      - cross-player-social-state      # Friends, Mailbox (out of scope MVP)
      - round-state-replay-buffers     # LastRoundReplay, MatchHistoryDetails
    referenced_by:
      - docs/architecture/adr-0011-persistence-schema.md
      - docs/architecture/adr-0001-crowd-replication-strategy.md  # Pillar 3 no-per-follower-persistence
      - docs/architecture/adr-0004-csm-authority.md                # Pillar 4 cosmetic data flow
      - docs/architecture/adr-0005-msm-roundlifecycle-split.md     # Coin grant at Result entry; clean-wipe T9
      - docs/architecture/adr-0006-module-placement-rules.md       # DataStoreService ban + Source Tree Map
      - docs/architecture/adr-0010-server-authoritative-validation-policy.md  # 4-check guard on PlayerData mutation requests
    added: 2026-04-27
    revised: ""

