# ─── PERFORMANCE BUDGETS ──────────────────────────────────────────────────────
# Frame time allocations per system, against a defined total frame budget.
# Conflicts: allocations that sum to more than the total budget = unshippable.
#
# Register a budget when an ADR explicitly claims a frame time allocation.
# The registry lets /architecture-review verify the total doesn't exceed the target.

performance_budgets:
  # ─── Platform FPS targets ─────────────────────────────────────────────────
  - target_fps: 60
    platform: desktop-pc
    total_frame_budget_ms: 16.67
    floor_fps: 55
    binding: false
    adr: docs/architecture/adr-0003-performance-budget.md
    validation_status: "PASS — prototype confirmed 60.0 FPS sustained, 8 crowds × 300 followers, 5-min desktop Studio soak (prototypes/crowd-sync/REPORT.md)"
    added: 2026-04-24
    revised: ""

  - target_fps: 45
    platform: mobile-iphone-se
    total_frame_budget_ms: 22.2
    floor_fps: 40
    binding: true  # drives all worst-case instance + CPU caps
    adr: docs/architecture/adr-0003-performance-budget.md
    validation_status: "DEFERRED — MVP-Integration-2 sprint (ADR-0001 Risk 1)"
    added: 2026-04-24
    revised: ""

  - target_fps: 60
    platform: console-xbox
    total_frame_budget_ms: 16.67
    floor_fps: 55
    binding: false
    adr: docs/architecture/adr-0003-performance-budget.md
    validation_status: "DEFERRED — post-MVP Xbox test kit not yet acquired"
    added: 2026-04-24
    revised: ""

  # ─── Server per-tick CPU (3 ms total across 9 phases) ────────────────────
  - system: tick-orchestrator
    status: active
    budget_ms: 3.0
    scope: server-per-tick-15hz
    reserve_ms: 0.9
    adr: docs/architecture/adr-0002-tick-orchestrator.md  # structure owner
    allocation_adr: docs/architecture/adr-0003-performance-budget.md  # budget owner
    phase_allocations_ms:
      phase_1_collision_resolver: 0.6
      phase_2_relic_system: 0.2
      phase_3_absorb_system: 0.4
      phase_4_chest_system: 0.1
      phase_5_csm_state_evaluate: 0.2
      phase_6_msm_timer_check: 0.05
      phase_7_msm_elim_consumer: 0.05
      phase_8_csm_broadcast_all: 0.4
      phase_9_peel_dispatcher: 0.1
    notes: "Reserve must remain positive. New phase or phase expansion requires ADR-0003 amendment; silent consumption of Reserve is forbidden."
    referenced_by:
      - docs/architecture/adr-0003-performance-budget.md
    added: 2026-04-24
    revised: ""

  # ─── Client per-frame CPU (mobile-binding shown; desktop in ADR-0003) ────
  - system: follower-entity-client-sim
    status: active
    budget_ms_desktop: 1.5
    budget_ms_mobile: 2.5
    scope: client-per-frame
    adr: docs/architecture/adr-0003-performance-budget.md
    notes: "Boids flocking + CFrame writes @ RenderStepped; scales linearly with rendered follower count (≤150 Parts worst case)"
    added: 2026-04-24
    revised: ""

  - system: follower-lod-manager
    status: active
    budget_ms_desktop: 0.1
    budget_ms_mobile: 0.2
    scope: client-per-frame
    adr: docs/architecture/adr-0003-performance-budget.md
    notes: "10 Hz subdivided — cost amortised across 6 frames at 60 FPS"
    added: 2026-04-24
    revised: ""

  - system: crowd-state-client-ingest
    status: active
    budget_ms_desktop: 0.3
    budget_ms_mobile: 0.5
    scope: client-per-frame
    adr: docs/architecture/adr-0003-performance-budget.md
    notes: "buffer decode (30 B × 12 crowds) × 15 Hz; only 25 % of 60 FPS frames carry a broadcast"
    added: 2026-04-24
    revised: ""

  - system: vfx-manager
    status: active
    budget_ms_desktop: 0.5
    budget_ms_mobile: 0.8
    scope: client-per-frame
    adr: docs/architecture/adr-0003-performance-budget.md
    notes: "Pool grants + emitter writes; bounded by 2000-particle suppression"
    added: 2026-04-24
    revised: ""

  - system: hud
    status: active
    budget_ms_desktop: 0.5
    budget_ms_mobile: 1.0
    scope: client-per-frame
    adr: docs/architecture/adr-0003-performance-budget.md
    notes: "11 widgets × 7 states; TextLabel + UIStroke updates per broadcast"
    added: 2026-04-24
    revised: ""

  - system: player-nameplate-plus-chest-billboard
    status: active
    budget_ms_desktop: 0.3
    budget_ms_mobile: 0.5
    scope: client-per-frame
    adr: docs/architecture/adr-0003-performance-budget.md
    notes: "Up to 12 Nameplates + 9 Chest billboards; BillboardGui scale risk MEDIUM"
    added: 2026-04-24
    revised: ""

  # ─── Network bandwidth (per-client steady-state, 10 KB/s cap) ────────────
  - system: crowd-state-broadcast-wire
    status: active
    budget_kbps: 5.4
    scope: network-per-client-steady-state
    adr: docs/architecture/adr-0001-crowd-replication-strategy.md  # source
    allocation_adr: docs/architecture/adr-0003-performance-budget.md
