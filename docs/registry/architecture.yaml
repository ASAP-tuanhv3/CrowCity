  - system: reliable-gameplay-events-wire
    status: active
    budget_kbps: 0.5
    scope: network-per-client-steady-state
    adr: docs/architecture/adr-0003-performance-budget.md
    notes: "CrowdCreated/Destroyed/Eliminated/RelicChanged/CountClamped + MatchStateChanged; bursty; 7 B/s avg over 300 s round"
    added: 2026-04-24
    revised: ""

  - system: vfx-remotes-wire
    status: active
    budget_kbps: 1.0
    scope: network-per-client-steady-state
    adr: docs/architecture/adr-0003-performance-budget.md
    notes: "9 VFX reliable events; 60 absorbs/min + 10 collisions + 6 chest opens per round × ~150 B avg"
    added: 2026-04-24
    revised: ""

  - system: client-to-server-input-wire
    status: active
    budget_kbps: 0.1
    scope: network-per-client-steady-state
    adr: docs/architecture/adr-0003-performance-budget.md
    notes: "ChestInteract + ChestDraftPick + AFKToggle — discrete events, rare per client"
    added: 2026-04-24
    revised: ""

  - system: player-data-updated-wire
    status: active
    budget_kbps: 0.2
    scope: network-per-client-steady-state
    adr: docs/architecture/adr-0003-performance-budget.md
    notes: "Currency grant at Result only; ~200 B per round"
    added: 2026-04-24
    revised: ""

  - system: npc-state-broadcast
    status: active
    budget_kbps: 3.0
    scope: network-per-client-steady-state
    adr: docs/architecture/adr-0008-npc-spawner-authority.md
    notes: "UnreliableRemoteEvent; 8 B/NPC buffer-encoded delta × ~25 NPCs/tick × 15 Hz; per-client relevance filter (crowd.radius + 25 studs cushion); mid-round-join NpcPoolBootstrap reliable burst absorbed by burst_allowance"
    added: 2026-04-26
    revised: ""

  - system: network-total-per-client
    status: active
    budget_kbps: 10.0
    reserve_kbps: 0.0
    scope: network-per-client-steady-state
    burst_allowance_kbps: 20.0   # ≤500 ms windows (round-start fan-out, chest-open stack, mid-round-join NpcPoolBootstrap)
    adr: docs/architecture/adr-0003-performance-budget.md
    notes: "REVISED 2026-04-26 per ADR-0008: Reserve consumed by NpcStateBroadcast (3.0 KB/s). Sum nominal 10.25 KB/s — slight overrun absorbed by burst_allowance window. Mobile-binding revalidation at MVP-Integration-3; if overrun, NPC cadence drops 15 → 10 Hz (allocation 3.0 → 2.0 KB/s)."
    added: 2026-04-24
