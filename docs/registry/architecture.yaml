# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: crowd_state_replication
    status: active
    api: UnreliableRemoteEvent
    not: RemoteEvent (reliable — overkill for continuous position) and RemoteFunction (yielding — adds latency with no benefit)
    adr: docs/architecture/adr-0001-crowd-replication-strategy.md
    reason: "UnreliableRemoteEvent matches cadence (15 Hz continuous) and tolerates packet loss. Client interpolates between received positions. Avoids reliability overhead of normal RemoteEvent."
    referenced_by:
      - docs/architecture/adr-0001-crowd-replication-strategy.md
      - docs/architecture/adr-0002-tick-orchestrator.md  # Phase 8 broadcast dispatch
      - docs/architecture/adr-0003-performance-budget.md  # bandwidth allocation
    added: 2026-04-20
    revised: 2026-04-25

  - purpose: server_gameplay_cadence
    status: active
    api: RunService.Heartbeat + accumulator pattern (single connection in TickOrchestrator)
    not: RunService.Stepped (pre-physics — CSM position-lag reads wrong character pos); per-system task.wait loops (drift, jitter, no determinism); multiple independent Heartbeat:Connect (race conditions on shared state)
    adr: docs/architecture/adr-0002-tick-orchestrator.md
    reason: "Single Heartbeat accumulator drains 1/15 s ticks atomically via while-loop; deterministic 9-phase dispatch within single Luau coroutine resume; post-physics hook lets CSM F2 read settled character positions; accumulator tolerates platform pause without tick loss or double-tick."
    referenced_by:
      - docs/architecture/adr-0002-tick-orchestrator.md
      - docs/architecture/adr-0003-performance-budget.md  # 3 ms/tick CPU allocation
    added: 2026-04-24
    revised: 2026-04-25

  - purpose: source_tree_mapping
    status: active
    api: Rojo (UpliftGames fork w/ syncback support, version-pinned in aftman.toml)
    not: Direct .rbxl editing (loses git history); custom build scripts (loses Rojo's syncback support); Roblox Studio's built-in package manager (incompatible with Wally)
    adr: docs/architecture/adr-0006-module-placement-rules.md
    reason: "Rojo maps src/ folder structure to Roblox service tree per default.project.json. Source of truth lives in git; Studio is a render of the source. Locked source-tree map (ADR-0006 §Source Tree Map) prevents drift. Wally generates Packages/ which Rojo includes via Wally's own integration."
    referenced_by:
      - docs/architecture/adr-0006-module-placement-rules.md
    added: 2026-04-26
    revised: ""

  - purpose: persistent_data_layer
    status: active
    api: ProfileStore (vendored at src/ReplicatedStorage/Dependencies/ProfileStore.luau) wrapped by PlayerDataServer
    not: DataStoreService directly (no session-lock, no auto-retry, no BindToClose integration); MessagingService (cross-server — Pillar 3 forbids); HttpService (no external HTTP for save data)
    adr: docs/architecture/adr-0006-module-placement-rules.md
    reason: "ProfileStore handles session-locking (prevents duplicate-load corruption), auto-retry on transient DataStore failures, BindToClose save-on-shutdown, and template-reconciliation for missing keys. Vendored (not Wally) — manual update procedure documented in ADR-0006 §Vendored vs Wally Policy."
    referenced_by:
      - docs/architecture/adr-0006-module-placement-rules.md
    added: 2026-04-26
    revised: ""

